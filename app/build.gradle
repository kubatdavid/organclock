plugins {
    id 'com.android.application'
}

android {
    namespace 'com.organclock'
    compileSdk 34

    defaultConfig {
        applicationId "com.organclock"
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
